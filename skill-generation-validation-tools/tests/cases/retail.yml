  uri: neo4j+s://demo.neo4jlabs.com:7687
  username: retail
  password: retail
  database: retail
  neo4j_version: '2026.01'
  cypher_version: '25'
  capabilities:
  - gds
  - apoc
  - apoc-extended
  - genai
  read_only: true
dataset:
  name: retail
  description: 'A fashion retail knowledge graph based on the H&M Kaggle dataset. Covers fashion products,

    product articles (specific variants), departments, and customer purchase transactions.

    Each purchase is represented as a PURCHASED relationship with a transaction date, price, and

    sales channel. Two vector indexes support semantic search on product descriptions and visual

    article graph embeddings. Use to explore product catalogues, department structure, customer

    purchasing patterns, and product similarity.

    Contains 8,044 products, 13,351 articles, 266 departments, 1,000 customers, and 23,199 purchases.

    '
  schema:
    nodes:
      Product:
        description: A base fashion product (master record covering all colour/size variants)
        properties:
          productCode:
            type: INTEGER
            description: Unique product code
          prodName:
            type: STRING
            sample:
            - Strap top
            - OP T-shirt (Idro)
            - Shape Up 30 den 1p Tights
          productGroupName:
            type: STRING
            sample:
            - Garment Upper body
            - Underwear
            - Socks & Tights
            - Garment Lower body
            - Accessories
          productTypeName:
            type: STRING
            sample:
            - Vest top
            - Bra
            - Leggings/Tights
            - Trousers
            - T-shirt
          garmentGroupName:
            type: STRING
            sample:
            - Jersey Basic
            - Under-, Nightwear
            - Socks and Tights
            - Jersey Fancy
          garmentGroupNo:
            type: INTEGER
          text:
            type: STRING
            description: Detailed product description for search
          detailDesc:
            type: STRING
            description: Short description
          url:
            type: STRING
          textEmbedding:
            type: VECTOR
            dimensions: 1536
            description: Text embedding of product description
      Article:
        description: A specific product variant (specific colour/style combination)
        properties:
          articleId:
            type: INTEGER
            description: Unique article identifier
          prodName:
            type: STRING
            description: Article product name (same as parent Product in most cases)
          productTypeName:
            type: STRING
          colourGroupCode:
            type: STRING
          colourGroupName:
            type: STRING
            sample:
            - Black
            - White
            - Blue
            - Grey
            - Beige
            - Pink
            - Red
          graphicalAppearanceNo:
            type: INTEGER
          graphicalAppearanceName:
            type: STRING
            sample:
            - Solid
            - Stripe
            - Melange
          graphEmbedding:
            type: VECTOR
            dimensions: 128
            description: Visual graph embedding of the article
      Department:
        description: A store department and section classification
        properties:
          departmentNo:
            type: INTEGER
          departmentName:
            type: STRING
            sample:
            - Jersey Basic
            - Clean Lingerie
            - Tights basic
            - Jersey
          sectionNo:
            type: INTEGER
          sectionName:
            type: STRING
            sample:
            - Womens Everyday Basics
            - Womens Lingerie
            - Men Underwear
            - Mama
      Customer:
        description: A retail customer
        properties:
          customerId:
            type: STRING
            description: Unique customer identifier string
          age:
            type: FLOAT
            description: Customer age in years (sparse — some customers have null age)
          clubMemberStatus:
            type: STRING
            values:
            - ACTIVE
            - PRE-CREATE
            description: Loyalty club status
          fashionNewsFrequency:
            type: STRING
            values:
            - Regularly
            - NONE
            description: Frequency of fashion newsletter subscription
          active:
            type: FLOAT
            values:
            - 1.0
            description: Whether the customer is active (1.0 = active; null = inactive)
    relationships:
    - type: PURCHASED
      from: Customer
      to: Article
      description: Customer purchased this article — relationship has transaction properties
      properties:
        tDat:
          type: DATE
          description: Transaction date
        price:
          type: FLOAT
          description: Purchase price (normalised 0–1 scale)
        salesChannelId:
          type: INTEGER
          values:
          - 1
          - 2
          description: 1 = store, 2 = online
    - type: VARIANT_OF
      from: Article
      to: Product
      description: This article is a variant of the parent product
    - type: FROM_DEPARTMENT
      from: Article
      to: Department
      description: This article belongs to this department
    indexes:
    - name: product_text_embeddings
      type: VECTOR
      on: Product(textEmbedding)
      dimensions: 1536
      similarity: cosine
      call: CALL db.index.vector.queryNodes('product_text_embeddings', N, $vec) YIELD node, score
      description: Vector similarity search on product text descriptions
    - name: article_graph_embeddings
      type: VECTOR
      on: Article(graphEmbedding)
      dimensions: 128
      similarity: cosine
      call: CALL db.index.vector.queryNodes('article_graph_embeddings', N, $vec) YIELD node, score
      description: Graph embedding similarity search on article visual features
    - label: Article
      property: articleId
      type: RANGE
    - label: Customer
      property: customerId
      type: RANGE
    - label: Department
      property: departmentNo
      type: RANGE
    - label: Product
      property: productCode
      type: RANGE
  notes:
  - Articles are specific colour/style variants — each article belongs to a parent Product via VARIANT_OF
  - PURCHASED is on (Customer)-[:PURCHASED]->(Article) — NOT to Product directly
  - FROM_DEPARTMENT is on (Article)-[:FROM_DEPARTMENT]->(Department)
  - Purchase price is normalised (0–1 scale) — not a real currency amount
  - 'salesChannelId is INTEGER: 1 = in-store, 2 = online (NOT a string)'
  - Customer age may be null (NaN stored as null in graph) — use IS NOT NULL guards
  - 'clubMemberStatus values are ALL_CAPS: ''ACTIVE'' or ''PRE-CREATE'''
  - 'fashionNewsFrequency values: ''Regularly'' or ''NONE'''
  - article_graph_embeddings uses 128 dimensions (not 1536) — do not mix with product vector index
  - 'Vector search: SEARCH clause IS available on demo.neo4jlabs.com 2026.02.x (vector-only). Syntax: MATCH (p:Product) SEARCH p IN (VECTOR INDEX product_text_embeddings FOR $vec LIMIT N) SCORE AS score. Alternatively CALL db.index.vector.queryNodes(''product_text_embeddings'', N, $vec) YIELD node, score also works.'
  - 'Article.articleId, Customer.customerId, Product.productCode, Department.departmentNo are RANGE indexed — use these for efficient lookups'
  - All 13,351 articles have at least 1 purchase — 'articles never purchased' returns 0 rows. Use 'articles never purchased
    online' (salesChannelId <> 2, gives 3,568 results) instead.
  - 'Verified customer ID for Strap top collaborative filtering: ''a95794754e2b0a93f7830ada52a8f75cb2090d0829c5c2c9b40f940b28345035''
    (2 Strap top variants purchased)'
  - 'PURCHASED.tDat is DATE type (not STRING) — use date() for comparisons: WHERE r.tDat >= date(''2020-01-01'')'
  - Demo DB is read-only — write cases SKIP rather than FAIL
  - GDS/APOC procedures may not be available to the retail demo user — prefer pure Cypher for analysis
