- id: retail-complex-003
  question: Find articles that were purchased together by the same customer in the same month. Show pairs of article names
    that co-appear in at least 5 customer baskets.
  database: retail
  difficulty: complex
  tags:
  - co-purchase
  - aggregation
  - temporal
  - filter
  - limit
  domain: retail
  min_results: 1
  max_db_hits: 1100000
  max_allocated_memory_bytes: 1073741824
  max_runtime_ms: 60000
  is_write_query: false
  notes: "PURCHASED relationship has tDat: DATE property. To extract month, use: p.tDat.month (DATE field accessor, not a\
    \ function call).\nPattern for same-customer same-month baskets:\n  MATCH (c:Customer)-[p1:PURCHASED]->(a1:Article), (c)-[p2:PURCHASED]->(a2:Article)\n\
    \  WHERE a1.articleId < a2.articleId AND p1.tDat.year = p2.tDat.year AND p1.tDat.month = p2.tDat.month\n  WITH a1.prodName\
    \ AS item1, a2.prodName AS item2, count(DISTINCT c) AS co_buy_count\n  WHERE co_buy_count >= 5\n  RETURN item1, item2,\
    \ co_buy_count ORDER BY co_buy_count DESC LIMIT 20\nIMPORTANT: do NOT use collect() + UNWIND to compute baskets — use\
    \ direct cross-join on two MATCH clauses on the same customer.\n"
