database:
  uri: neo4j+s://demo.neo4jlabs.com:7687
  username: stackoverflow
  password: stackoverflow
  database: stackoverflow
  neo4j_version: '2026.01'
  cypher_version: '25'
  capabilities:
  - gds
  - apoc
  - apoc-extended
  - genai
  read_only: true
dataset:
  name: stackoverflow
  description: 'A Q&A knowledge graph containing Stack Overflow questions, answers,
    users, and programming

    language tags. A large dataset with ~41M posts, ~8.9M users, and ~52K tags. Use
    to explore

    expert knowledge networks, popular programming topics, answer quality, user reputation

    patterns, and tag co-occurrence relationships.

    '
  schema:
    nodes:
      Question:
        description: A question post on Stack Overflow — also has the Post label
        note: 'Questions also have the Post label: (:Post:Question). Always use :Question
          for specificity.'
        properties:
          id:
            type: INTEGER
            description: Unique post identifier
          title:
            type: STRING
            sample:
            - How do I calculate someone's age in C#?
            - Convert Decimal to Double?
          score:
            type: INTEGER
            description: Net upvotes minus downvotes — can be negative
          views:
            type: INTEGER
            description: Total view count
          answers:
            type: INTEGER
            description: Number of answers
          comments:
            type: INTEGER
            description: Number of comments
          favorites:
            type: INTEGER
            description: Number of times bookmarked
          createdAt:
            type: DATETIME
            sample:
            - '2008-07-31T21:42:52Z'
            description: DateTime of post creation
          updatedAt:
            type: DATETIME
            description: DateTime of last edit
      Answer:
        description: 'An answer post — also has the Post label: (:Post:Answer)'
        note: 'Answers also have the Post label. Use :Answer for specificity. WARNING:
          No RANGE indexes exist on :Answer properties (only Post(id) is indexed).
          Avoid full Answer scans — scope via ANSWERED relationship from a bounded
          Question set instead.'
        properties:
          id:
            type: INTEGER
          score:
            type: INTEGER
            description: Net upvote score of the answer — NOT indexed on :Answer label;
              avoid WHERE filters directly on Answer.score without scoping first
      User:
        description: A Stack Overflow user account
        properties:
          id:
            type: INTEGER
          name:
            type: STRING
            description: Display name
          reputation:
            type: INTEGER
            min: 1
            description: Reputation score — higher = more trusted
          views:
            type: INTEGER
            description: Number of profile views
          upvotes:
            type: INTEGER
          age:
            type: INTEGER
            description: User-reported age (sparse)
          location:
            type: STRING
            description: User-reported location (sparse)
          accountId:
            type: INTEGER
          createdAt:
            type: DATETIME
            description: Account creation date
      Tag:
        description: A programming topic tag
        properties:
          name:
            type: STRING
            sample:
            - javascript
            - python
            - java
            - c#
            - php
            - html
            - css
          count:
            type: INTEGER
            description: Total number of questions using this tag
    relationships:
    - type: POSTED
      from: User
      to: Question
      description: User posted this question
    - type: ANSWERED
      from: Answer
      to: Question
      description: This answer responds to the question
    - type: ACCEPTED
      from: Question
      to: Answer
      description: This answer was accepted as the best answer by the question author
    - type: TAGGED
      from: Question
      to: Tag
      description: Question is tagged with this topic
    - type: SIMILAR
      from: Tag
      to: Tag
      description: Two tags frequently co-occur on the same questions
    indexes:
    - labels: [Post]
      properties: [id]
      type: RANGE
    - labels: [Question]
      properties: [answers]
      type: RANGE
    - labels: [Question]
      properties: [comments]
      type: RANGE
    - labels: [Question]
      properties: [createdAt]
      type: RANGE
    - labels: [Question]
      properties: [favorites]
      type: RANGE
    - labels: [Question]
      properties: [score]
      type: RANGE
    - labels: [Question]
      properties: [title]
      type: RANGE
    - labels: [Question]
      properties: [updatedAt]
      type: RANGE
    - labels: [Question]
      properties: [views]
      type: RANGE
    - labels: [Tag]
      properties: [count]
      type: RANGE
    - labels: [Tag]
      properties: [name]
      type: RANGE
    - labels: [User]
      properties: [accountId]
      type: RANGE
    - labels: [User]
      properties: [age]
      type: RANGE
    - labels: [User]
      properties: [createdAt]
      type: RANGE
    - labels: [User]
      properties: [id]
      type: RANGE
    - labels: [User]
      properties: [location]
      type: RANGE
    - labels: [User]
      properties: [name]
      type: RANGE
    - labels: [User]
      properties: [reputation]
      type: RANGE
    - labels: [User]
      properties: [upvotes]
      type: RANGE
    - labels: [User]
      properties: [views]
      type: RANGE
  notes:
  - 'Very large DB: ~41M posts, ~8.9M users. Question and User have comprehensive RANGE
    indexes (see indexes block) — WHERE filters on indexed properties are fast. Answer
    has NO property indexes; always scope Answer queries via a bounded Question set
    using the ANSWERED relationship rather than scanning :Answer directly.'
  - 'For global analytics queries that must scan large node sets (e.g. avg over all
    Questions, count over all Answers via ANSWERED), use the parallel runtime:
    CYPHER 25 runtime=parallel MATCH ... This can reduce wall-clock time by 4-8x on
    multi-core servers and is the correct tool for aggregate scans on this DB.'
  - Questions have dual label (:Post:Question) — use :Question for matching questions
    specifically
  - Answers have dual label (:Post:Answer) — use :Answer for specificity
  - Tag.count is denormalized (pre-computed) — faster than counting via TAGGED relationships
  - Demo DB is read-only — write cases SKIP
  - QPE '+' quantifier NOT supported on demo server — use {1,} instead
  - No vector or fulltext index in this database — do not generate SEARCH or db.index.vector/fulltext
    queries
  - 'LIMIT is needed for relationship traversals and Answer scans. For indexed Question/User
    property filters, LIMIT is optional but good practice. Never do MATCH (a:Answer)
    WHERE a.score ... without first bounding via ANSWERED from a tag-scoped Question set.'
  - GDS procedures (gds.*) are listed in capabilities but may not be usable by the
    stackoverflow demo user — prefer pure Cypher for network analysis
  - 'Question.createdAt and User.createdAt are DATETIME type — use datetime() for
    comparisons: WHERE q.createdAt > datetime(''2020-01-01'')'
  - User.age is sparse (many nulls) — always guard with IS NOT NULL before numeric
    comparisons
  - User.location is sparse text — use CONTAINS or STARTS WITH for location filtering,
    never exact match
