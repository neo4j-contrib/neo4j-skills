# companies.yml — Test cases for neo4j-cypher-authoring-skill
# Database: demo.neo4jlabs.com — companies / companies
#
# Schema summary:
#   Nodes:      Organization (name, description, nbrEmployees, revenue, summary, wikipediaUrl)
#               Article (title, text, summary, sentiment, url, date)
#               Chunk   (text, embedding <Vector(1536)>)
#               IndustryCategory (name)
#   Relations:  (Organization)-[:HAS_SUBSIDIARY]->(Organization)
#               (Article)-[:MENTIONS]->(Organization)
#               (Article)-[:HAS_CHUNK]->(Chunk)
#               (Organization)-[:IN_INDUSTRY]->(IndustryCategory)
#   Indexes:    entity  — fulltext on Organization.name
#               news    — vector on Chunk.embedding
#
# Baseline metrics were captured against demo.neo4jlabs.com on 2026-03-20.
# Thresholds: max_db_hits = observed × 3, max_allocated_memory_bytes = observed × 3,
#             max_runtime_ms = observed × 5.
#
# NOTE: companies-generated.yml (generator output) is gitignored.
# Promote stubs from generated → this file after human review.

