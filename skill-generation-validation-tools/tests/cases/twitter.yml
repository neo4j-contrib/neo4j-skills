# twitter.yml — Test cases for neo4j-cypher-authoring-skill
# NOTE: twitter-generated.yml (generator output) is gitignored.
# Promote stubs from generated → this file after human review.
# Thresholds: max_db_hits = observed × 3, max_allocated_memory_bytes = observed × 3,
#             max_runtime_ms = observed × 5.

database:
  uri: neo4j+s://demo.neo4jlabs.com:7687
  username: twitter
  database: twitter
  neo4j_version: "2026.02"
  cypher_version: "25"
  read_only: true  # demo.neo4jlabs.com — write cases SKIP rather than FAIL

dataset:
  name: twitter
  description: |
    A social media knowledge graph based on Twitter/X activity, primarily around Neo4j and tech
    topics from early 2021. Contains users, tweets, hashtags, links, and the social interactions
    between them: follows, retweets, replies, mentions, and tag usage. A :Me node identifies the
    central user account (Neo4j's official Twitter account). Use to explore influencer networks,
    hashtag trends, retweet patterns, and follower graph topology.
    Contains ~39K users, 2,407 tweets, 344 hashtags, and 44,630 FOLLOWS relationships.
  schema:
    nodes:
      User:
        description: "A Twitter/X user account"
        properties:
          screen_name:       {type: STRING, sample: ["neo4j", "NASAPersevere", "graphistas"], description: "Twitter handle (no @)"}
          name:              {type: STRING, description: "Display name"}
          followers:         {type: INTEGER, description: "Number of followers"}
          following:         {type: INTEGER, description: "Number of accounts this user follows"}
          statuses:          {type: INTEGER, description: "Total tweets/statuses posted"}
          betweenness:       {type: FLOAT, description: "Betweenness centrality score in the follow graph (sparse)"}
          location:          {type: STRING, description: "Self-reported location (sparse)"}
          profile_image_url: {type: STRING}
          url:               {type: STRING}
      Me:
        description: "The central user account in the dataset (Neo4j's official account: screen_name='neo4j'). Acts as the ego node of the social graph."
        properties:
          screen_name: {type: STRING, sample: ["neo4j"]}
          followers:   {type: INTEGER}
          following:   {type: INTEGER}
          betweenness: {type: FLOAT}
      Tweet:
        description: "A tweet or retweet post"
        properties:
          id:            {type: STRING, description: "Tweet ID string"}
          text:          {type: STRING, description: "Tweet content"}
          favorites:     {type: INTEGER, description: "Number of likes (stored as INTEGER or STRING depending on tweet; use coalesce/toInteger)"}
          created_at:    {type: STRING, description: "ISO datetime string of when tweet was created"}
          import_method: {type: STRING, description: "How the tweet was imported into the graph"}
      Hashtag:
        description: "A Twitter hashtag"
        properties:
          name: {type: STRING, sample: ["neo4j", "graphdatabases", "antimoneylaundering", "cloud", "education"], description: "Hashtag text in lowercase without the # symbol"}
      Link:
        description: "A URL shared in a tweet"
        properties:
          url: {type: STRING}
      Source:
        description: "The Twitter client app used to post (e.g. 'Twitter for iPhone')"
        properties:
          name: {type: STRING, sample: ["TweetDeck", "Twitter for iPhone", "Twitter Web App"]}
    relationships:
      - type: FOLLOWS
        from: User
        to: User
        description: "One user follows another (44,630 total)"
      - type: POSTS
        from: User
        to: Tweet
        description: "User posted this tweet"
      - type: TAGS
        from: Tweet
        to: Hashtag
        description: "Tweet uses this hashtag"
      - type: CONTAINS
        from: Tweet
        to: Link
        description: "Tweet contains this URL link"
      - type: USING
        from: Tweet
        to: Source
        description: "Tweet was posted using this client app"
      - type: MENTIONS
        from: Tweet
        to: User
        description: "Tweet mentions this user with @handle"
      - type: RETWEETS
        from: Tweet
        to: Tweet
        description: "This tweet is a retweet of another tweet"
      - type: REPLY_TO
        from: Tweet
        to: Tweet
        description: "This tweet is a reply to another tweet"
      - type: INTERACTS_WITH
        from: User
        to: User
        description: "Aggregated interaction relationship between users"
      - type: AMPLIFIES
        from: User
        to: User
        description: "User amplifies (retweets/shares) content from another user"
    indexes: []
  notes:
    - "The :Me node represents Neo4j's account (screen_name='neo4j') — it has both :Me and :User labels"
    - "Hashtag names are lowercase and have no # prefix in the graph (e.g. 'neo4j', not '#neo4j')"
    - "FOLLOWS is the main social graph relationship — 44,630 edges among ~39K users"
    - "Tweet.favorites may be stored as INTEGER or STRING depending on import — use toInteger() for numeric comparisons"
    - "No vector or fulltext indexes — use string matching for text search"
    - "Dataset is from early 2021; temporal questions should account for fixed date range"
    - "betweenness is sparse — most users have no betweenness score"

